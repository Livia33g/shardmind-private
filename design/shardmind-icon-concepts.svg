<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="520" fill="#F5EFE7"/>

  <text x="70" y="70" fill="#1E2A2F" font-family="Georgia, serif" font-size="34">ShardMind icon concepts</text>
  <text x="70" y="102" fill="#536166" font-family="Helvetica, Arial, sans-serif" font-size="18">Keep the name. Let the shared-memory idea live in the geometry, not the spelling.</text>

  <g transform="translate(70 150)">
    <rect x="0" y="0" width="300" height="300" rx="36" fill="#FDF9F3" stroke="#D7CAB9" stroke-width="3"/>
    <path d="M150 36L222 94L202 212L150 264L98 212L78 94L150 36Z" fill="#1E2A2F"/>
    <path d="M150 36L184 111L150 264" stroke="#F7F0E8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M78 94L150 112L222 94" stroke="#C9E7DE" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M98 212L150 184L202 212" stroke="#7FC8A9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="150" cy="112" r="9" fill="#C9E7DE"/>
    <circle cx="150" cy="184" r="9" fill="#7FC8A9"/>
    <text x="0" y="340" fill="#1E2A2F" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Concept A</text>
    <text x="0" y="370" fill="#536166" font-family="Helvetica, Arial, sans-serif" font-size="16">Faceted shard with an internal memory path.</text>
    <text x="0" y="394" fill="#536166" font-family="Helvetica, Arial, sans-serif" font-size="16">Feels premium, stable, and a little geological.</text>
  </g>

  <g transform="translate(450 150)">
    <rect x="0" y="0" width="300" height="300" rx="36" fill="#FDF9F3" stroke="#D7CAB9" stroke-width="3"/>
    <path d="M72 220L118 60L168 104L138 250L72 220Z" fill="#22333B"/>
    <path d="M228 220L182 60L132 104L162 250L228 220Z" fill="#1A252B"/>
    <path d="M118 60L150 38L182 60" stroke="#7FC8A9" stroke-width="7" stroke-linecap="round"/>
    <path d="M126 134C140 122 160 122 174 134" stroke="#C9E7DE" stroke-width="8" stroke-linecap="round"/>
    <path d="M122 174C138 160 162 160 178 174" stroke="#F7F0E8" stroke-width="8" stroke-linecap="round"/>
    <circle cx="150" cy="206" r="11" fill="#7FC8A9"/>
    <text x="0" y="340" fill="#1E2A2F" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Concept B</text>
    <text x="0" y="370" fill="#536166" font-family="Helvetica, Arial, sans-serif" font-size="16">Two shards leaning toward each other.</text>
    <text x="0" y="394" fill="#536166" font-family="Helvetica, Arial, sans-serif" font-size="16">Best if you want the shared-memory idea to read faster.</text>
  </g>

  <g transform="translate(830 150)">
    <rect x="0" y="0" width="300" height="300" rx="36" fill="#FDF9F3" stroke="#D7CAB9" stroke-width="3"/>
    <path d="M150 38L214 114L186 250H114L86 114L150 38Z" fill="#1E2A2F"/>
    <path d="M150 86L176 120L162 166H138L124 120L150 86Z" fill="#FDF9F3"/>
    <path d="M86 114L124 120L138 166" stroke="#7FC8A9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M214 114L176 120L162 166" stroke="#7FC8A9" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M114 250L138 166H162L186 250" stroke="#C9E7DE" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="340" fill="#1E2A2F" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700">Concept C</text>
    <text x="0" y="370" fill="#536166" font-family="Helvetica, Arial, sans-serif" font-size="16">A shard enclosing a central aperture.</text>
    <text x="0" y="394" fill="#536166" font-family="Helvetica, Arial, sans-serif" font-size="16">More distinctive, more abstract, slightly more brand-like.</text>
  </g>
</svg>
